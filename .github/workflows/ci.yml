name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run unit suite
        # The unit tests are pure-Python. ROS modules (rclpy, *_msgs) are
        # stubbed in sys.modules by the tests, so no colcon/rclpy build is
        # needed. conftest.py in each package puts the package on sys.path.
        run: python -m pytest src/ -v
